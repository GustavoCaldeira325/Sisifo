<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Sísifo</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #efefef;
      font-family: Georgia, "Times New Roman", serif;
      color: #111;
    }

    .container {
      max-width: 600px;
      padding: 40px;
      background-color: #ffffff;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      font-size: 30px;
      font-weight: 600;
      margin-bottom: 24px;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      margin: 8px 0;
    }

    .button {
      display: inline-block;
      margin-top: 32px;
      padding: 12px 24px;
      border: 1px solid #111;
      text-decoration: none;
      color: #111;
      font-size: 14px;
      letter-spacing: 1px;
    }

    .button:hover {
      background-color: #111;
      color: #fff;
    }
  .quote {
  font-style: italic;
  margin-bottom: 32px;
  color: #444;
}

.divider {
  width: 60px;
  height: 1px;
  background-color: #ccc;
  margin: 32px auto;
}
 .email-input {
  width: 100%;
  padding: 12px;
  margin-top: 32px;
  margin-bottom: 16px;
  border: 1px solid #ccc;
  box-sizing: border-box;
  font-family: inherit;
  font-size: 16px;
    }   
  </style>
</head>

<body>
  <div class="container">
    <h1>Sísifo</h1>

<p class="quote">
  “É subir a pedra montanha acima que faz Sísifo feliz.”
</p>

<div class="divider"></div>

<p>
  Um hábito por vez.
</p>

<p>
  Um dia por vez.
</p>

<p>
  Nada mais acontece.
</p>
<form action="https://formspree.io/f/mlgvrjvb" method="POST">
  <input
    type="email"
    name="email"
    placeholder="Seu email"
    required
    class="email-input"
  />

  <button type="submit" class="button">
    ENTRAR NA LISTA
  </button>
</form>
  </div>
  <script>
  function saveResult(status) {
    const habit = document.getElementById("habit").value;
    const reflection = document.getElementById("reflection").value;

    const data = {
      habit: habit,
      status: status,
      reflection: reflection
    };

    localStorage.setItem("sisifoData", JSON.stringify(data));

    renderData();
  }

  function renderData() {
    const result = document.getElementById("result");

    const savedData = localStorage.getItem("sisifoData");

    if (!savedData) {
      result.innerHTML = "";
      return;
    }

    const data = JSON.parse(savedData);

    result.innerHTML = `
      <h3>${data.habit}</h3>
      <p><strong>${data.status}</strong></p>
      <p>${data.reflection}</p>
    `;
  }

  renderData();
</script>
</body>
</html>
